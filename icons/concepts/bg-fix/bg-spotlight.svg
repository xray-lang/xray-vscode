<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- BG-Fix: Spotlight — Obsidian base + a soft warm radial glow centered on
       the right blade. The stripe gaps in that area pick up the warm tint
       (no longer pitch black), while the rest stays restrained dark.
       Effectively a localized "complementary contrast" injected only where needed. -->
  <defs>
    <linearGradient id="spBg" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%"   stop-color="#1a1d22" />
      <stop offset="100%" stop-color="#04060a" />
    </linearGradient>
    <linearGradient id="spRim" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.18" />
      <stop offset="20%"  stop-color="#ffffff" stop-opacity="0" />
      <stop offset="80%"  stop-color="#ffffff" stop-opacity="0" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.04" />
    </linearGradient>

    <!-- Warm spot behind the right blade (centered ~ x=620, y=512 in svg coords) -->
    <radialGradient id="spWarmSpot" cx="60%" cy="50%" r="38%">
      <stop offset="0%"   stop-color="#fbbf24" stop-opacity="0.18" />
      <stop offset="55%"  stop-color="#f59e0b" stop-opacity="0.07" />
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0" />
    </radialGradient>

    <!-- Cool spot behind the left blade (very subtle, just to balance) -->
    <radialGradient id="spCoolSpot" cx="40%" cy="50%" r="34%">
      <stop offset="0%"   stop-color="#3b82f6" stop-opacity="0.06" />
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0" />
    </radialGradient>

    <pattern id="appStripes" patternUnits="userSpaceOnUse" width="100" height="8">
      <rect x="0" y="0" width="100" height="5" fill="#3b82f6" />
    </pattern>
    <clipPath id="appRightBladeClip">
      <path d="M80,20 L60,20 L40,50 L70,90 L80,80 L60,50 Z" />
    </clipPath>
    <clipPath id="spContainerClip">
      <rect x="64" y="64" width="896" height="896" rx="200" />
    </clipPath>
  </defs>

  <!-- Base -->
  <rect x="64" y="64" width="896" height="896" rx="200" fill="url(#spBg)" />

  <!-- Warm + cool spots clipped to squircle -->
  <g clip-path="url(#spContainerClip)">
    <rect x="64" y="64" width="896" height="896" fill="url(#spCoolSpot)" />
    <rect x="64" y="64" width="896" height="896" fill="url(#spWarmSpot)" />
  </g>

  <!-- Inner rim highlight -->
  <rect x="65" y="65" width="894" height="894" rx="199" fill="none" stroke="url(#spRim)" stroke-width="2" />

  <g transform="translate(212, 212) scale(6)">
    <g transform="translate(0, 5)" opacity="0.4">
      <path d="M20,20 L40,20 L60,50 L30,90 L20,80 L40,50 Z" fill="#000" />
      <path d="M80,20 L60,20 L40,50 L70,90 L80,80 L60,50 Z" fill="#000" />
    </g>
    <path d="M20,20 L40,20 L60,50 L30,90 L20,80 L40,50 Z" fill="#ffffff" />
    <g clip-path="url(#appRightBladeClip)">
      <rect x="30" y="10" width="60" height="90" fill="url(#appStripes)" />
    </g>
  </g>
</svg>
