<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Concept: Graphite — brushed gunmetal, industrial precision tool feel -->
  <defs>
    <linearGradient id="graphiteBg" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%"   stop-color="#3a3f48" />
      <stop offset="50%"  stop-color="#252a32" />
      <stop offset="100%" stop-color="#13161b" />
    </linearGradient>

    <!-- Brushed metal: very subtle horizontal hairlines -->
    <pattern id="graphiteBrush" patternUnits="userSpaceOnUse" width="3" height="3">
      <rect width="3" height="1" fill="#ffffff" opacity="0.025" />
    </pattern>

    <!-- Top gloss highlight, fading to transparent -->
    <linearGradient id="graphiteGloss" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.10" />
      <stop offset="40%"  stop-color="#ffffff" stop-opacity="0.02" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>

    <clipPath id="graphiteContainerClip">
      <rect x="64" y="64" width="896" height="896" rx="200" />
    </clipPath>

    <pattern id="appStripes" patternUnits="userSpaceOnUse" width="100" height="8">
      <rect x="0" y="0" width="100" height="5" fill="#3b82f6" />
    </pattern>
    <clipPath id="appRightBladeClip">
      <path d="M80,20 L60,20 L40,50 L70,90 L80,80 L60,50 Z" />
    </clipPath>
  </defs>

  <!-- Base -->
  <rect x="64" y="64" width="896" height="896" rx="200" fill="url(#graphiteBg)" />

  <!-- Brushed metal texture, clipped to squircle -->
  <g clip-path="url(#graphiteContainerClip)">
    <rect x="64" y="64" width="896" height="896" fill="url(#graphiteBrush)" />
  </g>

  <!-- Top gloss overlay -->
  <rect x="64" y="64" width="896" height="896" rx="200" fill="url(#graphiteGloss)" />

  <!-- 1px outer highlight -->
  <rect x="65" y="65" width="894" height="894" rx="199" fill="none"
        stroke="#ffffff" stroke-opacity="0.07" stroke-width="2" />

  <!-- Logo (unchanged) -->
  <g transform="translate(212, 212) scale(6)">
    <g transform="translate(0, 5)" opacity="0.3">
      <path d="M20,20 L40,20 L60,50 L30,90 L20,80 L40,50 Z" fill="#000" />
      <path d="M80,20 L60,20 L40,50 L70,90 L80,80 L60,50 Z" fill="#000" />
    </g>
    <path d="M20,20 L40,20 L60,50 L30,90 L20,80 L40,50 Z" fill="#ffffff" />
    <g clip-path="url(#appRightBladeClip)">
      <rect x="30" y="10" width="60" height="90" fill="url(#appStripes)" />
    </g>
  </g>
</svg>
