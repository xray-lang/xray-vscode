<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Variant: Origin — current blue-500 #3b82f6 (baseline) -->
  <defs>
    <linearGradient id="bg" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%"   stop-color="#1a1d22" />
      <stop offset="100%" stop-color="#04060a" />
    </linearGradient>
    <linearGradient id="rim" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.18" />
      <stop offset="20%"  stop-color="#ffffff" stop-opacity="0" />
      <stop offset="80%"  stop-color="#ffffff" stop-opacity="0" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.04" />
    </linearGradient>

    <pattern id="stripes" patternUnits="userSpaceOnUse" width="100" height="8">
      <rect x="0" y="0" width="100" height="5" fill="#3b82f6" />
    </pattern>
    <clipPath id="rightBladeClip">
      <path d="M80,20 L60,20 L40,50 L70,90 L80,80 L60,50 Z" />
    </clipPath>
  </defs>

  <rect x="64" y="64" width="896" height="896" rx="200" fill="url(#bg)" />
  <rect x="65" y="65" width="894" height="894" rx="199" fill="none" stroke="url(#rim)" stroke-width="2" />

  <g transform="translate(212, 212) scale(6)">
    <g transform="translate(0, 5)" opacity="0.4">
      <path d="M20,20 L40,20 L60,50 L30,90 L20,80 L40,50 Z" fill="#000" />
      <path d="M80,20 L60,20 L40,50 L70,90 L80,80 L60,50 Z" fill="#000" />
    </g>
    <path d="M20,20 L40,20 L60,50 L30,90 L20,80 L40,50 Z" fill="#ffffff" />
    <g clip-path="url(#rightBladeClip)">
      <rect x="30" y="10" width="60" height="90" fill="url(#stripes)" />
    </g>
  </g>
</svg>
